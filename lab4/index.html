<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Lab 4: Sign Up Form </title>
    <script src="js/script.js" defer></script>
</head>

<body>

    <h1> Sign Up Form </h1>
    <fieldset>
        <legend>Sign Up</legend>
        First Name: <input type="text"><br>
        Last Name: <input type="text"><br>
        Email: <input type="text"><br>
        Phone Number: <input type="text"><br><br>
        Zip Code: <input id="zipCode" type="text"><br>
        City: <span id="city"></span>
        <br>
        Latitude: <span id="latitude"></span>
        <br>
        Longitude: <span id="longitude"></span>
        <br><br>
        State: <select id="state"></select><br>
        Select a County: <select id="county"></select><br>

        Desired Username: <input id="usernameTextBox" type="text"><span id="usernameAvailability"></span><br>
        Password: <input id="password" type="password"><span id="suggestedPw"></span><br>
        <div id="signUpErr"></div>
        Type Password Again: <input type="password"><br>
        <input type="submit" value="Sign Up!">
    </fieldset>

</body>

</html>
